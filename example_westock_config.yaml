# WeStock 数据源配置示例
# 使用 westock-data CLI 获取 A 股市场数据（无需 akshare/tushare）

provider:
  type: westock
  date_column: trade_date
  westock:
    start_date: "2026-03-01"
    end_date: "2026-04-08"
    market: hs
    index_codes:
      - sh000001
      - sh000300
    timeout_seconds: 30
    retry_count: 3
    cache_dir: "./westock_cache"

weights:
  # 基础特征权重
  advance_decline: 1.0
  limit_up_down: 1.0
  gap_breadth: 0.8
  reversal_breadth: 0.5
  turnover_surge: 0.8
  intraday_volatility: 0.6
  amount_breadth: 0.4
  # 高级特征权重（westock 精准特征）
  advance_ratio: 1.2
  limit_up_ratio: 1.5
  limit_down_ratio: 1.5    # 跌停比例（特征值已取反：跌停率↑→特征值↓→得分负向）
  limit_net_ratio: 1.3
  continuation_stocks: 0.8
  volume_change_ratio: 0.9
  # 降级特征（设为 0 可禁用）
  break_board_ratio: 0.0
  seal_board_ratio: 0.0
  heaven_earth_count: 0.0
  abnormal_movement_count: 0.7
  auction_strength: 0.6

rolling_window: 20
